name: ECG MLOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      - run: pytest tests/

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v3
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/ecg-arrhythmia-api
          tags: type=sha,prefix=
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-k8s-manifest:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update image tag in deployment manifest
        run: |
          NEW_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          sed -i "s|image: .*ecg-arrhythmia-api:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/ecg-arrhythmia-api:${NEW_TAG}|" \
            k8s/api/deployment.yml
      - name: Commit updated manifest
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/api/deployment.yml
          git commit -m "ci: update api image to ${{ needs.build-and-push.outputs.image_tag }}"
          git push
