apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecg-api
  namespace: ecg-mlops
  labels:
    app: ecg-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecg-api
  template:
    metadata:
      labels:
        app: ecg-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: ecg-api
          image: taher2512/ecg-arrhythmia-api:448f9be
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_PATH
              value: "/app/models/best_finetuned_model.pth"
            - name: MODEL_VERSION
              valueFrom:
                configMapKeyRef:
                  name: ecg-api-config
                  key: model_version
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 6
